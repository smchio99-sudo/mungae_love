<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한양대 ERICA 러브 시뮬레이션 시즌 2 - 조현우 선배</title>
  <style>
    :root {
      --ink: #251d25;
      --muted: #746775;
      --panel: rgba(255, 250, 253, 0.92);
      --line: rgba(57, 45, 61, 0.14);
      --rose: #ff7295;
      --rose-deep: #d94c73;
      --mint: #67c7ae;
      --sky: #7ab4e8;
      --sun: #ffd37a;
      --shadow: 0 24px 70px rgba(71, 39, 64, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      color: var(--ink);
      background: #f7f3ef;
      overflow: hidden;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
      background: linear-gradient(180deg, #f8fbff 0%, #fdf6f4 52%, #f5ede7 100%);
      user-select: none;
      -webkit-user-select: none;
    }

    input,
    textarea {
      user-select: text;
      -webkit-user-select: text;
    }

    .background {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transition: background 600ms ease;
    }

    .background::before,
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bg-campus {
      background:
        linear-gradient(180deg, rgba(151, 207, 246, 0.92) 0%, rgba(255, 244, 222, 0.95) 58%, rgba(210, 235, 215, 0.98) 100%);
    }

    .bg-campus::before {
      background:
        linear-gradient(90deg, transparent 0 8%, rgba(255,255,255,0.7) 8% 9%, transparent 9% 100%),
        linear-gradient(13deg, transparent 0 48%, rgba(92, 127, 95, 0.5) 48% 50%, transparent 50%),
        linear-gradient(0deg, transparent 0 65%, rgba(255,255,255,0.35) 65% 66%, transparent 66%),
        radial-gradient(circle at 15% 22%, rgba(255,255,255,0.9) 0 8%, transparent 8.5%),
        linear-gradient(180deg, transparent 0 46%, rgba(50, 91, 96, 0.18) 46% 47%, transparent 47%),
        linear-gradient(90deg, rgba(83, 122, 133, 0.35) 0 14%, transparent 14% 28%, rgba(83, 122, 133, 0.35) 28% 42%, transparent 42% 100%);
      clip-path: polygon(0 0, 100% 0, 100% 76%, 0 91%);
      opacity: 0.8;
    }

    .bg-campus::after {
      background:
        linear-gradient(175deg, transparent 0 60%, rgba(255,255,255,0.75) 60% 66%, transparent 66%),
        linear-gradient(90deg, transparent 0 4%, rgba(77, 143, 105, 0.28) 4% 7%, transparent 7% 15%, rgba(77, 143, 105, 0.28) 15% 19%, transparent 19% 100%),
        linear-gradient(180deg, transparent 0 72%, rgba(132, 96, 72, 0.22) 72% 100%);
      opacity: 0.9;
    }

    .bg-classroom {
      background:
        linear-gradient(180deg, #e8f2ff 0%, #fff8ed 52%, #ede5dd 100%);
    }

    .bg-classroom::before {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.9) 0 10%, transparent 10% 13%, rgba(255,255,255,0.9) 13% 23%, transparent 23% 100%),
        linear-gradient(180deg, transparent 0 16%, rgba(56, 121, 111, 0.72) 16% 54%, transparent 54%),
        linear-gradient(90deg, transparent 0 18%, rgba(255,255,255,0.25) 18% 19%, transparent 19% 36%, rgba(255,255,255,0.25) 36% 37%, transparent 37%),
        linear-gradient(0deg, transparent 0 62%, rgba(88, 68, 54, 0.34) 62% 64%, transparent 64%);
      clip-path: polygon(5% 8%, 95% 8%, 100% 79%, 0 84%);
    }

    .bg-classroom::after {
      background:
        repeating-linear-gradient(8deg, transparent 0 58px, rgba(99, 77, 63, 0.18) 59px 64px),
        linear-gradient(180deg, transparent 0 76%, rgba(95, 67, 52, 0.2) 76% 100%);
      opacity: 0.65;
    }

    .bg-club {
      background:
        linear-gradient(180deg, #fff5e3 0%, #f8e7de 55%, #eadfd7 100%);
    }

    .bg-club::before {
      background:
        linear-gradient(90deg, transparent 0 14%, rgba(255,255,255,0.6) 14% 30%, transparent 30% 100%),
        linear-gradient(180deg, rgba(107, 92, 78, 0.24) 0 17%, transparent 17% 100%),
        radial-gradient(circle at 22% 68%, rgba(103, 199, 174, 0.42) 0 10%, transparent 10.5%),
        radial-gradient(circle at 38% 67%, rgba(255, 211, 122, 0.55) 0 7%, transparent 7.5%),
        radial-gradient(circle at 54% 68%, rgba(122, 180, 232, 0.44) 0 8%, transparent 8.5%);
    }

    .bg-club::after {
      background:
        linear-gradient(0deg, rgba(117, 82, 63, 0.28) 0 25%, transparent 25%),
        linear-gradient(90deg, transparent 0 20%, rgba(94, 60, 45, 0.24) 20% 84%, transparent 84%),
        repeating-linear-gradient(90deg, transparent 0 68px, rgba(94, 60, 45, 0.16) 69px 72px);
      opacity: 0.8;
    }

    .bg-cafe {
      background:
        linear-gradient(180deg, #fff0d3 0%, #ffdcd6 47%, #f1d8c7 100%);
    }

    .bg-cafe::before {
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 211, 122, 0.8) 0 7%, transparent 7.5%),
        radial-gradient(circle at 78% 20%, rgba(255,255,255,0.62) 0 10%, transparent 10.5%),
        linear-gradient(90deg, rgba(255,255,255,0.55) 0 20%, transparent 20% 100%),
        linear-gradient(180deg, transparent 0 58%, rgba(77, 52, 43, 0.22) 58% 100%);
    }

    .bg-cafe::after {
      background:
        linear-gradient(90deg, transparent 0 26%, rgba(255,255,255,0.52) 26% 74%, transparent 74%),
        linear-gradient(180deg, transparent 0 71%, rgba(130, 78, 61, 0.27) 71% 74%, transparent 74%);
      opacity: 0.9;
    }

    .bg-lake {
      background:
        linear-gradient(180deg, #9ccdf2 0%, #ffe5b7 43%, #e9f1ce 63%, #9dc9d3 64%, #79afc5 100%);
    }

    .bg-lake::before {
      background:
        radial-gradient(circle at 82% 15%, rgba(255, 237, 163, 0.95) 0 8%, transparent 8.5%),
        linear-gradient(7deg, transparent 0 51%, rgba(81, 137, 91, 0.38) 51% 60%, transparent 60%),
        linear-gradient(-8deg, transparent 0 48%, rgba(81, 137, 91, 0.32) 48% 58%, transparent 58%);
    }

    .bg-lake::after {
      background:
        repeating-linear-gradient(178deg, rgba(255,255,255,0.22) 0 2px, transparent 2px 42px),
        linear-gradient(180deg, transparent 0 76%, rgba(255,255,255,0.16) 76% 100%);
      opacity: 0.75;
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      pointer-events: none;
    }

    .title-chip,
    .meter {
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.58);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 28px rgba(71, 39, 64, 0.12);
      border-radius: 999px;
    }

    .title-chip {
      width: fit-content;
      padding: 10px 15px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .meter {
      min-width: 210px;
      padding: 10px 12px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 13px;
      font-weight: 800;
      color: #5e4d5b;
      margin-bottom: 7px;
    }

    .meter-track {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(74, 58, 70, 0.16);
    }

    .meter-fill {
      height: 100%;
      width: 15%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), var(--rose), var(--sun));
      transition: width 450ms ease;
    }

    .stage {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .character {
      position: absolute;
      left: 50%;
      bottom: 112px;
      width: min(43vw, 480px);
      max-height: 78vh;
      transform: translateX(-50%);
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 30px 40px rgba(45, 32, 45, 0.26));
      transition: opacity 280ms ease, transform 380ms ease, filter 280ms ease;
      user-select: none;
    }

    .character.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
    }

    .heart {
      position: absolute;
      z-index: 1;
      color: rgba(255, 114, 149, 0.55);
      font-size: 28px;
      animation: floatHeart 5s ease-in-out infinite;
      text-shadow: 0 6px 20px rgba(255, 114, 149, 0.26);
    }

    .heart:nth-child(1) { left: 17%; top: 28%; animation-delay: -1s; }
    .heart:nth-child(2) { right: 18%; top: 34%; animation-delay: -2.4s; font-size: 20px; }
    .heart:nth-child(3) { left: 34%; top: 17%; animation-delay: -3.5s; font-size: 18px; }
    .heart:nth-child(4) { right: 32%; top: 23%; animation-delay: -0.3s; font-size: 24px; }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(0) rotate(-4deg); opacity: 0.28; }
      45% { transform: translateY(-24px) rotate(5deg); opacity: 0.76; }
    }

    .dialogue {
      position: absolute;
      left: 50%;
      bottom: 22px;
      z-index: 6;
      width: min(1100px, calc(100vw - 34px));
      min-height: 190px;
      transform: translateX(-50%);
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.66);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .name {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 7px 13px;
      margin-bottom: 10px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, #3b7f93, #d94c73);
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(217, 76, 115, 0.22);
    }

    .text {
      min-height: 64px;
      font-size: clamp(18px, 2vw, 23px);
      line-height: 1.62;
      word-break: keep-all;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
      margin-top: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .next,
    .choice,
    .small {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .next {
      min-width: 142px;
      padding: 13px 18px;
      color: white;
      background: linear-gradient(135deg, var(--rose), #ef8a55);
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(217, 76, 115, 0.26);
    }

    .next:hover,
    .choice:hover,
    .small:hover {
      transform: translateY(-2px);
    }

    .choice-wrap {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .choice {
      min-height: 58px;
      padding: 12px 14px;
      text-align: left;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(71, 39, 64, 0.08);
    }

    .choice small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.35;
    }

    .choice-input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      outline: none;
    }

    .choice-input:focus {
      border-color: rgba(255, 114, 149, 0.88);
      box-shadow: 0 0 0 4px rgba(255, 114, 149, 0.16);
    }

    .menu {
      position: absolute;
      right: 18px;
      bottom: 232px;
      z-index: 7;
      display: flex;
      gap: 8px;
    }

    .small {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 20px rgba(71, 39, 64, 0.11);
      font-weight: 900;
    }

    .flash {
      position: absolute;
      inset: 0;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.86), transparent 56%);
      transition: opacity 400ms ease;
    }

    .flash.on { opacity: 1; }

    .toast {
      position: absolute;
      left: 50%;
      top: 76px;
      z-index: 8;
      transform: translateX(-50%) translateY(-14px);
      opacity: 0;
      padding: 10px 14px;
      border-radius: 999px;
      color: white;
      background: rgba(217, 76, 115, 0.92);
      box-shadow: 0 12px 30px rgba(217, 76, 115, 0.28);
      font-weight: 900;
      transition: opacity 220ms ease, transform 220ms ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .ending-card {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(255, 246, 249, 0.5);
      backdrop-filter: blur(7px);
    }

    .ending-card.show { display: grid; }

    .ending-inner {
      width: min(760px, 100%);
      padding: 26px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.74);
      background: rgba(255,255,255,0.88);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .ending-inner h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 52px);
      letter-spacing: 0;
    }

    .ending-inner p {
      margin: 0 auto 18px;
      max-width: 620px;
      color: #5d505d;
      font-size: 18px;
      line-height: 1.7;
      word-break: keep-all;
    }

    .ending-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ending-actions button {
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .ending-actions button:first-child {
      background: linear-gradient(135deg, var(--rose), #ef8a55);
    }

    .title-screen {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255, 247, 251, 0.22), rgba(38, 24, 35, 0.4)),
        url("assets/bg-campus.png") center / cover no-repeat;
      transition: opacity 520ms ease, visibility 520ms ease;
    }

    .title-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .title-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,255,255,0.7), transparent 25%),
        linear-gradient(180deg, transparent 0 58%, rgba(255, 114, 149, 0.28) 100%);
      pointer-events: none;
    }

    .title-screen::after {
      content: "♥";
      position: absolute;
      top: 17%;
      right: 23%;
      color: rgba(255, 114, 149, 0.68);
      font-size: clamp(34px, 5vw, 72px);
      filter: drop-shadow(0 10px 26px rgba(217, 76, 115, 0.3));
      animation: floatHeart 4s ease-in-out infinite;
    }

    .title-content {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 18px;
      width: min(920px, calc(100vw - 32px));
      padding-bottom: 84px;
      text-align: center;
      color: white;
      text-shadow: 0 8px 30px rgba(41, 24, 38, 0.42);
    }

    .title-content h1 {
      margin: 0;
      font-size: clamp(48px, 9vw, 104px);
      line-height: 1.04;
      letter-spacing: 0;
      font-weight: 950;
    }

    .title-content p {
      margin: 0;
      max-width: 620px;
      font-size: clamp(17px, 2.1vw, 24px);
      font-weight: 800;
      line-height: 1.55;
      word-break: keep-all;
    }

    .touch-play {
      position: absolute;
      left: 50%;
      bottom: 52px;
      z-index: 2;
      transform: translateX(-50%);
      color: white;
      font-size: clamp(18px, 2.6vw, 30px);
      font-weight: 950;
      letter-spacing: 0;
      text-transform: lowercase;
      text-shadow: 0 8px 24px rgba(42, 24, 38, 0.48);
      animation: blinkPlay 1.05s ease-in-out infinite;
      white-space: nowrap;
    }

    .nickname-form {
      position: relative;
      z-index: 3;
      width: min(360px, 86vw);
      margin: 24px auto 0;
      display: grid;
      gap: 10px;
    }

    .nickname-form input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 8px;
      background: rgba(255,255,255,0.84);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      text-align: center;
      outline: none;
      box-shadow: 0 12px 28px rgba(42, 24, 38, 0.16);
    }

    .nickname-form input:focus {
      border-color: rgba(255, 114, 149, 0.9);
      box-shadow: 0 0 0 4px rgba(255, 114, 149, 0.22), 0 12px 28px rgba(42, 24, 38, 0.16);
    }

    .nickname-form button {
      padding: 13px 16px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--rose), #ef8a55);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(217, 76, 115, 0.26);
    }

    @keyframes blinkPlay {
      0%, 100% { opacity: 0.25; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    }

    .bg-campus,
    .bg-classroom,
    .bg-club,
    .bg-cafe,
    .bg-home,
    .bg-lake,
    .bg-crossfit,
    .bg-pcroom,
    .bg-billiards,
    .bg-dining,
    .bg-bandroom,
    .bg-lakepark,
    .bg-concert,
    .bg-performance,
    .bg-pocha {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bg-campus { background-image: url("assets/bg-campus.png"); }
    .bg-classroom { background-image: url("assets/bg-classroom.png"); }
    .bg-club { background-image: url("assets/bg-club.png"); }
    .bg-cafe { background-image: url("assets/bg-cafe.png"); }
    .bg-home { background-image: url("assets/bg-home.png"); }
    .bg-lake { background-image: url("assets/bg-campus.png"); }
    .bg-crossfit { background-image: url("assets/bg-crossfit.png"); }
    .bg-pcroom { background-image: url("assets/bg-pcroom.png"); }
    .bg-billiards { background-image: url("assets/bg-billiards.png"); }
    .bg-dining { background-image: url("assets/bg-dining.png"); }
    .bg-bandroom { background-image: url("assets/bg-bandroom.png"); }
    .bg-lakepark { background-image: url("assets/bg-lakepark.png"); }
    .bg-concert { background-image: url("assets/bg-concert.png"); }
    .bg-performance { background-image: url("assets/bg-performance.png"); }
    .bg-pocha { background-image: url("assets/bg-pocha.png"); }
    .bg-black { background: #050505; }

    .bg-campus::before,
    .bg-classroom::before,
    .bg-club::before,
    .bg-cafe::before,
    .bg-home::before,
    .bg-lake::before,
    .bg-crossfit::before,
    .bg-pcroom::before,
    .bg-billiards::before,
    .bg-dining::before,
    .bg-bandroom::before,
    .bg-lakepark::before,
    .bg-concert::before,
    .bg-performance::before,
    .bg-pocha::before,
    .bg-black::before {
      background: linear-gradient(180deg, rgba(20, 18, 24, 0.08), rgba(20, 18, 24, 0.32));
      clip-path: none;
      opacity: 1;
    }

    .bg-campus::after,
    .bg-classroom::after,
    .bg-club::after,
    .bg-cafe::after,
    .bg-home::after,
    .bg-lake::after,
    .bg-crossfit::after,
    .bg-pcroom::after,
    .bg-billiards::after,
    .bg-dining::after,
    .bg-bandroom::after,
    .bg-lakepark::after,
    .bg-concert::after,
    .bg-performance::after,
    .bg-pocha::after,
    .bg-black::after {
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.24), transparent 24%),
        linear-gradient(180deg, transparent 0 55%, rgba(255, 230, 238, 0.18) 100%);
      opacity: 1;
    }

    .bg-black::before,
    .bg-black::after {
      background: none;
      opacity: 0;
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .game { min-height: 100svh; height: 100svh; overflow: hidden; }
      .topbar {
        grid-template-columns: 1fr;
        right: 14px;
        left: 14px;
        top: 12px;
      }
      .title-chip {
        max-width: 100%;
        font-size: 14px;
      }
      .meter {
        width: min(290px, 100%);
        min-width: 0;
      }
      .character {
        width: min(76vw, 390px);
        bottom: 248px;
      }
      .dialogue {
        bottom: 12px;
        width: calc(100vw - 20px);
        min-height: 224px;
        padding: 14px;
      }
      .text {
        min-height: 84px;
        font-size: 17px;
        line-height: 1.55;
      }
      .choice-wrap {
        grid-template-columns: 1fr;
      }
      .controls {
        align-items: center;
      }
      .hint {
        font-size: 12px;
      }
      .next {
        min-width: 110px;
        padding: 12px 14px;
      }
      .menu {
        right: 12px;
        bottom: 252px;
      }
    }
  </style>
</head>

        sprite: "surprised",
        text: "갑작스러운 제안이다.",
        choices: [
          { label: "빠진다", affection: 10, result: "내가 난간 쪽으로 한 발 내딛자 현우 선배가 바로 앞을 막아섰다. “농담이에요. 100만원보다 {name}씨가 훨씬 비싸요.”" },
          { label: "안 빠진다", affection: 7, result: "“현명해요.” 현우 선배가 웃었다. “역시 우리 팀 베이스는 판단력이 좋아야죠.”" }
        ]
      },
      { bg: "black", speaker: "", sprite: "none", text: "며칠 뒤, 공연날." },
      {
        bg: "concert",
        speaker: "나",
        sprite: "none",
        text: "공연장 객석을 보는 순간 손끝이 차가워졌다. 팀 {team}, 곡은 {song}. 몇 주 동안 연습한 모든 소리가 오늘 한 번에 지나갈 예정이었다."
      },
      {
        bg: "concert",
        speaker: "조현우",
        sprite: "normal",
        text: "“긴장돼요? 괜찮아요. 틀려도 내가 노래로 덮을게요. 대신 잘하면 내가 제일 먼저 박수칠 거예요.”"
      },
      {
        bg: "performance",
        speaker: "나",
        sprite: "none",
        text: "조명이 켜지고, 드럼 카운트가 시작됐다. 내 베이스가 첫 박자를 밀어냈고, 현우 선배의 목소리가 그 위에 얹혔다. 우리는 성공적으로 공연을 끝냈다."
      },
      {
        bg: "performance",
        speaker: "조현우",
        sprite: "love",
        text: "“해냈다, {name}씨. 진짜 해냈어요.”",
        affection: 12
      },
      {
        bg: "concert",
        speaker: "조현우",
        sprite: "love",
        text: "“사실 {song} 준비하면서 매번 떨렸어요. 이 곡, 언젠가 {name}씨에게 불러주고 싶은 곡이었거든요.”"
      },
      {
        bg: "concert",
        speaker: "조현우",
        sprite: "love",
        text: "“나 {name}씨 많이 좋아해요. 뭉게구름 회장 말고, 그냥 조현우로. 나랑 사귀어줘요.”",
        choices: [
          { label: "“좋아요. 앞으로도 같이 연주해요.”", affection: 15, result: "현우 선배는 숨을 크게 내쉬고 웃었다. “그럼 다음 곡도 같이 정해요. 이번엔 연애하는 팀으로.”" },
          { label: "“미안해요. 저는 선배를 그런 마음으로 보진 않아요.”", affection: -30, speaker: "조현우", sprite: "sad", result: "조현우 선배는 눈물이 그렁그렁한 얼굴로 뒷걸음질쳤다. “하 씨발.. 이제 학교 어케다니노.” 그리고 그대로 무대 뒤로 달려가 버렸다.", gameOver: true }
        ]
      },
      {
        bg: "concert",
        speaker: "조현우",
        sprite: "love",
        text: "“진짜요? 우리... 사귀는 거예요?”"
      },
      {
        bg: "concert",
        speaker: "나",
        sprite: "love",
        text: "현우 선배는 마이크보다 조심스럽게 내 손을 잡았다. 공연장의 마지막 조명이 우리 둘 위에 오래 머물렀다."
      },
      {
        bg: "campus",
        speaker: "엔딩",
        sprite: "love",
        text: "봄의 ERICA, 뭉게구름, 팀 {team}, 그리고 조현우. 우리의 첫 공연은 끝났지만, 둘만의 앙코르는 이제 시작이었다.",
        end: true
      }
    ];

    const state = {
      index: 0,
      affection: 15,
      playerName: "주인공",
      teamName: "뭉게듀오",
      songTitle: "밤편지",
      auto: false,
      typing: false,
      currentText: "",
      timer: null
    };

    const bg = document.getElementById("bg");
    const sprite = document.getElementById("sprite");
    const speaker = document.getElementById("speaker");
    const line = document.getElementById("line");
    const nextBtn = document.getElementById("nextBtn");
    const choices = document.getElementById("choices");
    const affectionFill = document.getElementById("affectionFill");
    const affectionText = document.getElementById("affectionText");
    const toast = document.getElementById("toast");
    const bgm = document.getElementById("bgm");
    const musicBtn = document.getElementById("musicBtn");
    const autoBtn = document.getElementById("autoBtn");
    const skipBtn = document.getElementById("skipBtn");
    const flash = document.getElementById("flash");
    const ending = document.getElementById("ending");
    const endingText = document.getElementById("endingText");
    const restartBtn = document.getElementById("restartBtn");
    const bonusBtn = document.getElementById("bonusBtn");
    const titleScreen = document.getElementById("titleScreen");
    const nicknameForm = document.getElementById("nicknameForm");
    const nicknameInput = document.getElementById("nicknameInput");

    bgm.volume = 0.38;

    async function startMusic() {
      if (!bgm.paused) return;
      try {
        await bgm.play();
        musicBtn.textContent = "♫";
        musicBtn.title = "배경음악 끄기";
      } catch (error) {
        musicBtn.textContent = "♪";
      }
    }

    function toggleMusic() {
      if (bgm.paused) {
        startMusic();
      } else {
        bgm.pause();
        musicBtn.textContent = "♪";
        musicBtn.title = "배경음악 켜기";
      }
    }

    function startGame() {
      const name = nicknameInput.value.trim();
      state.playerName = name || "주인공";
      titleScreen.classList.add("hide");
      startMusic();
    }

    function formatText(text) {
      return String(text || "").replaceAll("{name}", state.playerName).replaceAll("{team}", state.teamName).replaceAll("{song}", state.songTitle);
    }

    function formatSpeaker(name) {
      return name === "나" ? state.playerName : formatText(name);
    }

    function setBg(name) {
      bg.className = `background bg-${name || "campus"}`;
    }

    function setSprite(name) {
      const src = sprites[name || "none"];
      if (!src) {
        sprite.classList.add("hidden");
        return;
      }
      if (!sprite.src.endsWith(src)) sprite.src = src;
      sprite.classList.remove("hidden");
      sprite.style.transform = name === "love"
        ? "translateX(-50%) translateY(-4px) scale(1.02)"
        : "translateX(-50%)";
      sprite.style.filter = name === "sad"
        ? "drop-shadow(0 30px 40px rgba(45, 32, 45, 0.2)) saturate(0.86)"
        : "drop-shadow(0 30px 40px rgba(45, 32, 45, 0.26))";
    }

    function updateAffection(delta = 0) {
      if (delta) {
        state.affection = Math.max(0, Math.min(100, state.affection + delta));
        toast.textContent = delta > 0 ? `설렘도 +${delta}` : `설렘도 ${delta}`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 950);
      }
      const value = Math.max(8, Math.min(100, state.affection));
      affectionFill.style.width = `${value}%`;
      affectionText.textContent = `${value}%`;
    }

    function typeText(text) {
      const renderedText = formatText(text);
      clearInterval(state.timer);
      state.typing = true;
      state.currentText = renderedText;
      line.textContent = "";
      let i = 0;
      state.timer = setInterval(() => {
        line.textContent += renderedText[i] || "";
        i += 1;
        if (i >= renderedText.length) {
          clearInterval(state.timer);
          state.typing = false;
          if (state.auto && !scenes[state.index].choices && !scenes[state.index].input && !scenes[state.index].end) {
            setTimeout(nextScene, 1150);
          }
        }
      }, 24);
    }

    function showChoices(scene) {
      choices.innerHTML = "";
      choices.style.display = "grid";
      nextBtn.style.display = "none";
      scene.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.className = "choice";
        button.textContent = choice.label;
        button.addEventListener("click", () => {
          updateAffection(choice.affection);
          flash.classList.add("on");
          setTimeout(() => flash.classList.remove("on"), 260);
          choices.style.display = "none";
          nextBtn.style.display = "";
          const insert = {
            bg: scene.bg,
            speaker: choice.speaker || "나",
            sprite: choice.sprite || scene.sprite,
            text: choice.result,
            gameOver: choice.gameOver
          };
          scenes.splice(state.index + 1, 0, insert);
          nextScene();
        });
        choices.appendChild(button);
      });
    }

    function showInput(scene) {
      choices.innerHTML = "";
      choices.style.display = "grid";
      nextBtn.style.display = "none";

      const input = document.createElement("input");
      input.className = "choice-input";
      input.maxLength = 18;
      input.placeholder = scene.input.placeholder;
      input.setAttribute("aria-label", scene.input.placeholder);

      const button = document.createElement("button");
      button.className = "choice";
      button.type = "button";
      button.textContent = scene.input.button;

      const submit = () => {
        const value = input.value.trim();
        if (scene.input.key === "teamName") state.teamName = value || "뭉게듀오";
        if (scene.input.key === "songTitle") state.songTitle = value || "밤편지";
        choices.style.display = "none";
        nextBtn.style.display = "";
        nextScene();
      };

      button.addEventListener("click", submit);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submit();
        }
      });

      choices.appendChild(input);
      choices.appendChild(button);
      input.focus();
    }

    function renderScene() {
      const scene = scenes[state.index];
      setBg(scene.bg);
      setSprite(scene.sprite);
      speaker.textContent = formatSpeaker(scene.speaker);
      choices.style.display = "none";
      nextBtn.style.display = scene.choices || scene.input ? "none" : "";
      if (scene.affection) updateAffection(scene.affection);
      typeText(scene.text);
      if (scene.choices) {
        setTimeout(() => {
          if (!state.typing) showChoices(scene);
        }, formatText(scene.text).length * 24 + 120);
      }
      if (scene.input) {
        setTimeout(() => {
          if (!state.typing) showInput(scene);
        }, formatText(scene.text).length * 24 + 120);
      }
      if (scene.end) {
        nextBtn.textContent = "엔딩 보기";
      } else if (scene.gameOver) {
        nextBtn.textContent = "게임 오버";
      } else {
        nextBtn.textContent = "다음";
      }
    }

    function nextScene() {
      const scene = scenes[state.index];
      if (state.typing) {
        clearInterval(state.timer);
        state.typing = false;
        line.textContent = state.currentText;
        if (scene.choices) showChoices(scene);
        if (scene.input) showInput(scene);
        return;
      }
      if (scene.end) {
        showEnding();
        return;
      }
      if (scene.gameOver) {
        showGameOver();
        return;
      }
      state.index += 1;
      renderScene();
    }

    function showEnding() {
      const grade = state.affection >= 90 ? "최고 설렘도" : state.affection >= 75 ? "달콤한 설렘도" : "포근한 설렘도";
      ending.querySelector("h1").textContent = "러브 엔딩";
      bonusBtn.style.display = "";
      endingText.textContent = `${grade} ${state.affection}%로 조현우 선배와 연인이 되었습니다. 뭉게구름의 팀 ${state.teamName}은 정기공연을 성공적으로 마쳤고, ${state.songTitle}은 둘만의 첫 고백곡이 되었습니다.`;
      ending.classList.add("show");
    }

    function showGameOver() {
      ending.querySelector("h1").textContent = "게임 오버";
      endingText.textContent = "고백은 거절됐고, 조현우 선배는 눈물과 함께 무대 뒤로 사라졌습니다. 다음 뭉게구름 합주에서 마이크 위치를 피해야 할지도 모릅니다.";
      bonusBtn.style.display = "none";
      ending.classList.add("show");
    }

    nextBtn.addEventListener("click", () => {
      startMusic();
      nextScene();
    });
    musicBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleMusic();
    });
    nicknameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      startGame();
    });
    titleScreen.addEventListener("click", (event) => {
      if (event.target.closest(".nickname-form")) return;
      startGame();
    });
    titleScreen.addEventListener("touchstart", (event) => {
      if (event.target.closest(".nickname-form")) return;
      event.preventDefault();
      startGame();
    }, { passive: false });
    restartBtn.addEventListener("click", () => {
      window.location.reload();
    });
    bonusBtn.addEventListener("click", () => {
      ending.classList.remove("show");
      state.index = scenes.findIndex((scene) => scene.text.includes("나 {name}씨 많이 좋아해요"));
      renderScene();
    });
    autoBtn.addEventListener("click", () => {
      state.auto = !state.auto;
      autoBtn.textContent = state.auto ? "Ⅱ" : "▶";
      if (state.auto && !state.typing && !scenes[state.index].choices && !scenes[state.index].input) {
        setTimeout(nextScene, 500);
      }
    });
    skipBtn.addEventListener("click", () => {
      if (state.typing) {
        clearInterval(state.timer);
        state.typing = false;
        line.textContent = state.currentText;
        if (scenes[state.index].choices) showChoices(scenes[state.index]);
        if (scenes[state.index].input) showInput(scenes[state.index]);
      } else if (choices.style.display === "grid") {
        return;
      } else {
        nextScene();
      }
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        if (!titleScreen.classList.contains("hide")) {
          startGame();
          return;
        }
        startMusic();
        if (choices.style.display === "grid") return;
        nextScene();
      }
    });
    window.addEventListener("pointerdown", startMusic, { once: true });

    updateAffection();
    renderScene();
  </script>
</body>
</html>
